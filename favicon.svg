<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f0c29"/>
      <stop offset="50%" stop-color="#1a1a4e"/>
      <stop offset="100%" stop-color="#24243e"/>
    </linearGradient>
    <!-- Mountain gradient -->
    <linearGradient id="mtGrad" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#2d3a6e"/>
      <stop offset="60%" stop-color="#6b8cce"/>
      <stop offset="100%" stop-color="#c8d8f0"/>
    </linearGradient>
    <!-- Snow cap gradient -->
    <linearGradient id="snowGrad" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#d0e0f0"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
    <!-- Glow filter for stars -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="0.8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Subtle shadow for mountain -->
    <filter id="shadow">
      <feDropShadow dx="0" dy="1" stdDeviation="1" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background rounded rect -->
  <rect width="64" height="64" rx="14" fill="url(#bgGrad)"/>

  <!-- Stars -->
  <g fill="#ffffff" opacity="0.6" filter="url(#glow)">
    <circle cx="10" cy="12" r="1"/>
    <circle cx="22" cy="8" r="0.7"/>
    <circle cx="52" cy="10" r="0.9"/>
    <circle cx="42" cy="6" r="0.6"/>
    <circle cx="58" cy="22" r="0.7"/>
    <circle cx="8" cy="26" r="0.5"/>
    <circle cx="16" cy="20" r="0.6"/>
  </g>

  <!-- Large moon -->
  <circle cx="48" cy="16" r="5" fill="#f0e68c" opacity="0.9" filter="url(#glow)"/>
  <circle cx="50" cy="14" r="4.5" fill="url(#bgGrad)" opacity="0.85"/>

  <!-- Mountain -->
  <polygon points="32,6 6,56 58,56" fill="url(#mtGrad)" filter="url(#shadow)"/>

  <!-- Snow cap on mountain -->
  <polygon points="32,6 24,22 40,22" fill="url(#snowGrad)" opacity="0.95"/>
  <!-- Snow cap detail lines -->
  <line x1="28" y1="14" x2="36" y2="14" stroke="#ffffff" stroke-width="0.5" opacity="0.5"/>
  <line x1="26" y1="18" x2="38" y2="18" stroke="#ffffff" stroke-width="0.5" opacity="0.4"/>

  <!-- Second small mountain in back -->
  <polygon points="52,26 40,56 64,56" fill="#1e2a5e" opacity="0.5"/>

  <!-- Ski tracks going down the mountain -->
  <path d="M36,28 Q34,36 30,42" stroke="#ffffff" stroke-width="1" fill="none" opacity="0.25"/>
  <path d="M38,30 Q36,38 32,44" stroke="#ffffff" stroke-width="1" fill="none" opacity="0.2"/>

  <!-- SKIER silhouette -->
  <g transform="translate(34, 34) rotate(18)">
    <!-- Body -->
    <line x1="0" y1="0" x2="-1" y2="-9" stroke="#ff6b6b" stroke-width="2.8" stroke-linecap="round"/>
    <!-- Head -->
    <circle cx="-1" cy="-11.5" r="2.5" fill="#ff6b6b"/>
    <!-- Arms - leaning forward with poles -->
    <line x1="-0.5" y1="-4" x2="-6" y2="-7" stroke="#ff6b6b" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="-0.5" y1="-4" x2="5" y2="-7" stroke="#ff6b6b" stroke-width="1.8" stroke-linecap="round"/>
    <!-- Ski poles -->
    <line x1="-6" y1="-7" x2="-8" y2="3" stroke="#a8d8ea" stroke-width="0.8" stroke-linecap="round"/>
    <line x1="5" y1="-7" x2="3" y2="3" stroke="#a8d8ea" stroke-width="0.8" stroke-linecap="round"/>
    <!-- Skis -->
    <line x1="-4" y1="1" x2="7" y2="1" stroke="#4ecdc4" stroke-width="1.8" stroke-linecap="round"/>
  </g>

  <!-- Snow particles near skier -->
  <g fill="#ffffff" opacity="0.5">
    <circle cx="40" cy="38" r="0.6"/>
    <circle cx="28" cy="40" r="0.5"/>
    <circle cx="42" cy="44" r="0.7"/>
    <circle cx="26" cy="36" r="0.4"/>
  </g>

  <!-- Bottom ground snow line -->
  <path d="M6,54 Q16,50 32,53 Q48,56 58,52" stroke="#ffffff" stroke-width="0.8" fill="none" opacity="0.15"/>
</svg>
